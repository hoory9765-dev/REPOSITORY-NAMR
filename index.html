<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Root Access | Terminal</title>
    <style>
        body {
            background-color: #0a0a0a; /* أسود فخم */
            /* أسود فخم */
            color: #00f3ff; /* لون نيون */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .terminal-box {
            border: 1px solid #00f3ff;
            padding: 40px;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
            background: rgba(0, 0, 0, 0.8);
            border-radius: 8px;
            text-align: center;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            background-color: #00f3ff;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .btn-enter {
            margin-top: 20px;
            padding: 10px 25px;
            background: transparent;
            border: 1px solid #00f3ff;
            color: #00f3ff;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-enter:hover {
            background: #00f3ff;
            color: #0a0a0a;
            box-shadow: 0 0 15px #00f3ff;
        }
    </style>
</head>
<body>

    <div class="terminal-box">
        <h1>> SYSTEM_INITIALIZED...</h1>
        <p>Welcome to the Secure Lab <span class="cursor">_</span></p>
        <a href="arsenal.html" class="btn-enter">ENTER SYSTEM</a>
    </div>

</body>
</html>
